# ─────────────────────────────────────────────────────────────
# WellNest — MongoDB Services (Headless + ClusterIP)
# Environment: prod
# Namespace: wellnest-prod
# Phase: 2 — Kubernetes Manifests
# ─────────────────────────────────────────────────────────────

apiVersion: v1
kind: Service
metadata:
  name: mongodb-headless
  namespace: wellnest-prod
  labels:
    app: mongodb
    app.kubernetes.io/part-of: wellnest
    app.kubernetes.io/managed-by: kubectl
    environment: prod
spec:
  clusterIP: None
  publishNotReadyAddresses: true
  selector:
    app: mongodb
  ports:
    - name: mongodb
      port: 27017
      targetPort: 27017

---

apiVersion: v1
kind: Service
metadata:
  name: mongodb
  namespace: wellnest-prod
  labels:
    app: mongodb
    app.kubernetes.io/part-of: wellnest
    app.kubernetes.io/managed-by: kubectl
    environment: prod
spec:
  type: ClusterIP
  selector:
    app: mongodb
  ports:
    - name: mongodb
      port: 27017
      targetPort: 27017
