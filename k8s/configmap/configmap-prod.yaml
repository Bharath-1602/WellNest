# ─────────────────────────────────────────────────────────────
# WellNest — ConfigMap for non-secret configuration (prod)
# Environment: prod
# Namespace: wellnest-prod
# Phase: 2 — Kubernetes Manifests
# ─────────────────────────────────────────────────────────────

apiVersion: v1
kind: ConfigMap
metadata:
  name: wellnest-config
  namespace: wellnest-prod
  labels:
    app.kubernetes.io/part-of: wellnest
    app.kubernetes.io/managed-by: kubectl
    environment: prod
data:
  NODE_ENV: "production"
  LOG_LEVEL: "info"

  AUTH_SERVICE_PORT: "3001"
  ASSESSMENT_SERVICE_PORT: "3002"
  THERAPIST_SERVICE_PORT: "3003"
  FRONTEND_PORT: "80"

  AUTH_SERVICE_URL: >-
    http://auth-service.wellnest-prod.svc.cluster.local:3001
  ASSESSMENT_SERVICE_URL: >-
    http://assessment-service.wellnest-prod.svc.cluster.local:3002
  THERAPIST_SERVICE_URL: >-
    http://therapist-service.wellnest-prod.svc.cluster.local:3003

  MONGODB_HOST: >-
    mongodb-0.mongodb-headless.wellnest-prod.svc.cluster.local
  MONGODB_PORT: "27017"
  MONGODB_DATABASE: "wellnest"
  MONGODB_REPLICA_SET: "rs0"

  FRONTEND_URL: "http://wellnest-prod.local"

  JWT_EXPIRY: "24h"
  JWT_ALGORITHM: "HS256"

  RUN_SEED: "true"
