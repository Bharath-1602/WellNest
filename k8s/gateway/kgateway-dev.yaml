# ─────────────────────────────────────────────────────────────
# WellNest — KGateway (Gateway API) + HTTPRoute
# Environment: dev
# Namespace: wellnest-dev
# Phase: 2 — Kubernetes Manifests
# ─────────────────────────────────────────────────────────────
# Check existing gateways first:
#   kubectl get gateway -A
# If a shared gateway exists, comment out the Gateway resource
# and update parentRefs in HTTPRoute to point to it.
# ─────────────────────────────────────────────────────────────

apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: wellnest-gateway
  namespace: wellnest-dev
  labels:
    app.kubernetes.io/part-of: wellnest
    app.kubernetes.io/managed-by: kubectl
    environment: dev
spec:
  gatewayClassName: kgateway
  listeners:
    - name: http
      protocol: HTTP
      port: 80
      hostname: "wellnest-dev.local"
      allowedRoutes:
        namespaces:
          from: Same

---

# ─────────────────────────────────────────────────────────────
# HTTPRoute — Path-based routing for all WellNest services
# /api/auth/*        → auth-service:3001
# /api/assessment/*  → assessment-service:3002
# /api/therapist/*   → therapist-service:3003
# /*                 → frontend-active:80 (catch-all)
# ─────────────────────────────────────────────────────────────

apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: wellnest-routes
  namespace: wellnest-dev
  labels:
    app.kubernetes.io/part-of: wellnest
    app.kubernetes.io/managed-by: kubectl
    environment: dev
spec:
  parentRefs:
    - name: wellnest-gateway
      namespace: wellnest-dev
      sectionName: http
  hostnames:
    - "wellnest-dev.local"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /api/auth
      backendRefs:
        - name: auth-service
          port: 3001
          weight: 100
    - matches:
        - path:
            type: PathPrefix
            value: /api/assessment
      backendRefs:
        - name: assessment-service
          port: 3002
          weight: 100
    - matches:
        - path:
            type: PathPrefix
            value: /api/therapist
      backendRefs:
        - name: therapist-service
          port: 3003
          weight: 100
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: frontend-active
          port: 80
          weight: 100
