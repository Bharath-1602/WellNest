# ─────────────────────────────────────────────────────────────
# WellNest — Network Policies
# Environment: dev
# Namespace: wellnest-dev
# ─────────────────────────────────────────────────────────────

# Policy 1: MongoDB only accepts from backend services
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: mongodb-ingress-policy
  namespace: wellnest-dev
  labels:
    app.kubernetes.io/part-of: wellnest
    app.kubernetes.io/managed-by: kubectl
    environment: dev
spec:
  podSelector:
    matchLabels:
      app: mongodb
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: auth-service
        - podSelector:
            matchLabels:
              app: assessment-service
        - podSelector:
            matchLabels:
              app: therapist-service
        - podSelector:
            matchLabels:
              app: mongodb
        - podSelector:
            matchLabels:
              app: mongodb-init
      ports:
        - protocol: TCP
          port: 27017

---

# Policy 2: Frontend CANNOT access MongoDB
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: frontend-deny-mongodb
  namespace: wellnest-dev
  labels:
    app.kubernetes.io/part-of: wellnest
    app.kubernetes.io/managed-by: kubectl
    environment: dev
spec:
  podSelector:
    matchLabels:
      app: frontend
  policyTypes:
    - Egress
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: auth-service
      ports:
        - protocol: TCP
          port: 3001
    - to:
        - podSelector:
            matchLabels:
              app: assessment-service
      ports:
        - protocol: TCP
          port: 3002
    - to:
        - podSelector:
            matchLabels:
              app: therapist-service
      ports:
        - protocol: TCP
          port: 3003
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
