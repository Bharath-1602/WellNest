# ─────────────────────────────────────────────────────────────
# WellNest — Sealed Secret template for prod environment
# Environment: prod
# Namespace: wellnest-prod
# Phase: 2 — Kubernetes Manifests
# ─────────────────────────────────────────────────────────────
#
# SEALED SECRET — wellnest-prod
#
# Sealed Secrets are encrypted with THIS cluster's public key.
# The REPLACE_WITH_SEALED_VALUE placeholders below must be
# replaced with values generated by kubeseal on your cluster.
#
# STEP 1: Verify sealed-secrets controller is running
#   kubectl get pods -n kube-system | grep sealed-secrets
#
# STEP 2: Create the raw secret (DO NOT COMMIT THIS FILE)
#   kubectl create secret generic wellnest-secrets \
#     --namespace=wellnest-prod \
#     --from-literal=MONGODB_ROOT_USER=admin \
#     --from-literal=MONGODB_ROOT_PASS=WellNestSecure2024! \
#     --from-literal=MONGODB_URI=mongodb://admin:WellNestSecure2024!@mongodb-0.mongodb-headless.wellnest-prod.svc.cluster.local:27017,mongodb-1.mongodb-headless.wellnest-prod.svc.cluster.local:27017,mongodb-2.mongodb-headless.wellnest-prod.svc.cluster.local:27017/wellnest?authSource=admin&replicaSet=rs0 \
#     --from-literal=JWT_SECRET=wellnest-prod-jwt-secret-replace-with-strong-key \
#     --dry-run=client \
#     -o yaml > /tmp/wellnest-secrets-prod-raw.yaml
#
# STEP 3: Seal it using kubeseal
#   kubeseal \
#     --controller-name=sealed-secrets-controller \
#     --controller-namespace=kube-system \
#     --format yaml \
#     < /tmp/wellnest-secrets-prod-raw.yaml \
#     > k8s/secrets/sealedsecret-prod.yaml
#
# STEP 4: Delete raw file immediately
#   rm /tmp/wellnest-secrets-prod-raw.yaml
#
# STEP 5: Verify it can be decrypted
#   kubeseal --validate < k8s/secrets/sealedsecret-prod.yaml
#
# STEP 6: Apply it
#   kubectl apply -f k8s/secrets/sealedsecret-prod.yaml
#
# STEP 7: Confirm the real Secret was created
#   kubectl get secret wellnest-secrets -n wellnest-prod
#
# ─────────────────────────────────────────────────────────────

apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: wellnest-secrets
  namespace: wellnest-prod
  labels:
    app.kubernetes.io/part-of: wellnest
    app.kubernetes.io/managed-by: kubectl
    environment: prod
  annotations:
    sealedsecrets.bitnami.com/cluster-wide: "false"
spec:
  encryptedData:
    MONGODB_ROOT_USER: REPLACE_WITH_SEALED_VALUE
    MONGODB_ROOT_PASS: REPLACE_WITH_SEALED_VALUE
    MONGODB_URI: REPLACE_WITH_SEALED_VALUE
    JWT_SECRET: REPLACE_WITH_SEALED_VALUE
  template:
    metadata:
      name: wellnest-secrets
      namespace: wellnest-prod
      labels:
        app.kubernetes.io/part-of: wellnest
        environment: prod
    type: Opaque
