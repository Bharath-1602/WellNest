# ─────────────────────────────────────────────────────────────
# WellNest — Therapist Service Deployment
# Environment: prod
# Namespace: wellnest-prod
# Phase: 2 — Kubernetes Manifests
# ─────────────────────────────────────────────────────────────
# ─── REPLACE BEFORE APPLYING ─────────────────────────────────
# bharath44623 → your DockerHub username
# ─────────────────────────────────────────────────────────────

apiVersion: apps/v1
kind: Deployment
metadata:
  name: therapist-service
  namespace: wellnest-prod
  labels:
    app: therapist-service
    app.kubernetes.io/part-of: wellnest
    app.kubernetes.io/managed-by: kubectl
    environment: prod
spec:
  replicas: 2
  selector:
    matchLabels:
      app: therapist-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: therapist-service
        environment: prod
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000

      containers:
        - name: therapist-service
          image: docker.io/bharath44623/wellnest-therapist-service:1.0.0.0
          imagePullPolicy: Always
          ports:
            - containerPort: 3003
              name: http
              protocol: TCP

          env:
            - name: PORT
              valueFrom:
                configMapKeyRef:
                  name: wellnest-config
                  key: THERAPIST_SERVICE_PORT
            - name: NODE_ENV
              valueFrom:
                configMapKeyRef:
                  name: wellnest-config
                  key: NODE_ENV
            - name: FRONTEND_URL
              valueFrom:
                configMapKeyRef:
                  name: wellnest-config
                  key: FRONTEND_URL
            - name: JWT_EXPIRY
              valueFrom:
                configMapKeyRef:
                  name: wellnest-config
                  key: JWT_EXPIRY
            - name: AUTH_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: wellnest-config
                  key: AUTH_SERVICE_URL
            - name: ASSESSMENT_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: wellnest-config
                  key: ASSESSMENT_SERVICE_URL
            - name: MONGODB_URI
              valueFrom:
                secretKeyRef:
                  name: wellnest-secrets
                  key: MONGODB_URI
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: wellnest-secrets
                  key: JWT_SECRET

          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"

          livenessProbe:
            httpGet:
              path: /health
              port: 3003
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
            successThreshold: 1

          readinessProbe:
            httpGet:
              path: /health
              port: 3003
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
            successThreshold: 1

          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop: ["ALL"]
