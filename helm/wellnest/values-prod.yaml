# Prod environment overrides
global:
  namespace: wellnest-prod
  environment: prod
  urls:
    frontend: http://wellnest-prod.local

auth:
  replicaCount: 2
  image:
    repository: wellnest-auth-service
    tag: "1.0.0.0"
  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

assessment:
  replicaCount: 2
  image:
    repository: wellnest-assessment-service
    tag: "1.0.0.0"
  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

therapist:
  replicaCount: 2
  image:
    repository: wellnest-therapist-service
    tag: "1.0.0.0"
  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

frontend:
  replicaCount: 2
  image:
    repository: wellnest-frontend
    tag: "1.0.0.0"
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 400m
      memory: 256Mi
  hpa:
    minReplicas: 2
    maxReplicas: 5

mongo:
  storage:
    size: 5Gi

nfs:
  enabled: false

gateway:
  hostname: wellnest-prod.local
