{{- if .Values.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nfs-client-provisioner
  namespace: kube-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nfs-client-provisioner
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: nfs-client-provisioner
    spec:
      serviceAccountName: nfs-client-provisioner
      containers:
        - name: nfs-client-provisioner
          image: {{ .Values.image.repository }}:{{ .Values.image.tag }}
          volumeMounts:
            - name: nfs-client-root
              mountPath: /persistentvolumes
          env:
            - name: PROVISIONER_NAME
              value: {{ .Values.provisioner }}
            - name: NFS_SERVER
              value: {{ .Values.serverIP | quote }}
            - name: NFS_PATH
              value: {{ .Values.serverPath | quote }}
      volumes:
        - name: nfs-client-root
          nfs:
            server: {{ .Values.serverIP | quote }}
            path: {{ .Values.serverPath | quote }}
{{- end }}
