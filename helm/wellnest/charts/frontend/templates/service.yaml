# Frontend active + preview services for Argo Rollout blue-green
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-active
  namespace: {{ .Values.global.namespace }}
  labels:
    app: frontend
    app.kubernetes.io/part-of: wellnest
    app.kubernetes.io/managed-by: Helm
    environment: {{ .Values.global.environment }}
spec:
  type: ClusterIP
  selector:
    app: frontend
  ports:
    - name: http
      port: 80
      targetPort: 80
      protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-preview
  namespace: {{ .Values.global.namespace }}
  labels:
    app: frontend
    app.kubernetes.io/part-of: wellnest
    app.kubernetes.io/managed-by: Helm
    environment: {{ .Values.global.environment }}
spec:
  type: ClusterIP
  selector:
    app: frontend
  ports:
    - name: http
      port: 80
      targetPort: 80
      protocol: TCP
