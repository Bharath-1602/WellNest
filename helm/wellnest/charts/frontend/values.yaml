global:
  namespace: wellnest
  environment: base
  dockerUsername: bharath44623
  image:
    pullPolicy: Always

replicaCount: 1
image:
  repository: wellnest-frontend
  tag: latest
resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 128Mi
rollout:
  autoPromotionEnabled: false
  scaleDownDelaySeconds: 30
  previewReplicaCount: 1
hpa:
  enabled: true
  minReplicas: 1
  maxReplicas: 3
  cpuUtilization: 70
  memoryUtilization: 80
probes:
  liveness:
    initialDelaySeconds: 15
    periodSeconds: 20
    timeoutSeconds: 5
    failureThreshold: 3
  readiness:
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3
