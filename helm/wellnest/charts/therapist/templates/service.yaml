apiVersion: v1
kind: Service
metadata:
  name: therapist-service
  namespace: {{ .Values.global.namespace }}
  labels:
    app: therapist-service
    app.kubernetes.io/part-of: wellnest
    app.kubernetes.io/managed-by: Helm
    environment: {{ .Values.global.environment }}
spec:
  type: ClusterIP
  selector:
    app: therapist-service
  ports:
    - name: http
      port: {{ .Values.global.services.therapist.port }}
      targetPort: {{ .Values.global.services.therapist.port }}
      protocol: TCP
