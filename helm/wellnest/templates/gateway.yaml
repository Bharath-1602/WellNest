# KGateway + HTTPRoute for path-based routing
{{- if .Values.gateway.enabled }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: wellnest-gateway
  namespace: {{ include "wellnest.namespace" . }}
  labels:
    {{- include "wellnest.labels" . | nindent 4 }}
spec:
  gatewayClassName: {{ .Values.gateway.gatewayClassName }}
  listeners:
    - name: http
      protocol: HTTP
      port: 80
      hostname: {{ .Values.gateway.hostname | quote }}
      allowedRoutes:
        namespaces:
          from: Same
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: wellnest-routes
  namespace: {{ include "wellnest.namespace" . }}
  labels:
    {{- include "wellnest.labels" . | nindent 4 }}
spec:
  parentRefs:
    - name: wellnest-gateway
      namespace: {{ include "wellnest.namespace" . }}
      sectionName: http
  hostnames:
    - {{ .Values.gateway.hostname | quote }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /api/auth
      backendRefs:
        - name: auth-service
          port: {{ .Values.global.services.auth.port }}
          weight: 100
    - matches:
        - path:
            type: PathPrefix
            value: /api/assessment
      backendRefs:
        - name: assessment-service
          port: {{ .Values.global.services.assessment.port }}
          weight: 100
    - matches:
        - path:
            type: PathPrefix
            value: /api/therapist
      backendRefs:
        - name: therapist-service
          port: {{ .Values.global.services.therapist.port }}
          weight: 100
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: frontend-active
          port: 80
          weight: 100
{{- end }}
